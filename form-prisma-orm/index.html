<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registo ORM com Prisma</title>
</head>
<body>
    <h2>Formulário de Registo (Método ORM com Prisma)</h2>
    
    <form method="POST" action="/submit">
        <label for="name">Nome:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        
        <button type="submit">Enviar Dados (Prisma)</button>
    </form>
</body>
</html>
